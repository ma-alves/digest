name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_newsapi_key: ${{ secrets.NEWSAPI_KEY }}
      TF_VAR_from_email: ${{ secrets.FROM_EMAIL }}
      TF_VAR_admin_email: ${{ secrets.ADMIN_EMAIL }}
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.0

      - run: npm ci
        working-directory: ./

      - run: npm run build:handlers
        working-directory: ./

      - run: npm test
        working-directory: ./

      - name: Ensure S3 backend bucket exists
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        run: |
          set -e
          if aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            echo "Bucket $TF_STATE_BUCKET already exists"
          else
            echo "Creating bucket $TF_STATE_BUCKET in $AWS_REGION"
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$TF_STATE_BUCKET"
            else
              aws s3api create-bucket --bucket "$TF_STATE_BUCKET" --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
            aws s3api put-public-access-block --bucket "$TF_STATE_BUCKET" --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            aws s3api put-bucket-versioning --bucket "$TF_STATE_BUCKET" --versioning-configuration Status=Enabled
            echo "Bucket $TF_STATE_BUCKET created and configured"
          fi

      - run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
      - run: terraform validate
      - run: terraform plan -out=tfplan

      - name: Apply
        run: terraform apply -auto-approve tfplan
