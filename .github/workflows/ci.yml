name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm ci

      - run: npm audit --audit-level=high

      - run: npm run lint

      - run: npm test

      - run: npm run build:handlers
