spring.application.name=digest

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/digest
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Determines how the schema is created or updated, turn off in prod
spring.jpa.hibernate.ddl-auto=update

# docker run --rm -p 5432:5432 -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=digest -v digest-volume:/var/lib/postgresql/data postgres:17
# Shows SQL statement in console, might turn off later
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Keys
# Reads from .env file (loaded by DotenvConfig) or environment variable
newsapi.api-key=${NEWSAPI_KEY:}

# Spring Batch
spring.batch.jdbc.initialize-database=always
spring.batch.job.enabled=false

# Spring Batch Job Repository
spring.datasource.hikari.maximum-pool-size=20

# Newsletter Configuration
newsletter.search-query=technology
newsletter.language=en
newsletter.article-count=10
newsletter.schedule.cron=0 0 8 * * ?

# AWS SES Configuration
# For LocalStack development:
aws.ses.endpoint=http://localhost:4566
aws.ses.region=us-east-1
aws.ses.access-key=test
aws.ses.secret-key=test
aws.ses.from-email=noreply@digest.local
aws.ses.max-retries=3

# Thymeleaf
spring.thymeleaf.cache=true