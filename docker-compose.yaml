services:
  postgres:
    image: postgres:17
    container_name: digest-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=digest
    ports:
      - "5432:5432"
    volumes:
      - digest-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: digest-localstack
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      - SERVICES=ses
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - "${TMPDIR:-.}/.localstack:/tmp/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "awslocal", "ses", "verify-email-identity", "--email-address", "noreply@digest.local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  digest-data: